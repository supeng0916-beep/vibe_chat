services:
  - type: web
    name: vibechat-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: openai
      # ── OpenAI 标准接口（base_url 可换兼容网关）──
      - key: OPENAI_BASE_URL
        value: https://dm-fox.rjj.cc/codex/v1
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_API_KEY
        sync: false  # 在 Render 控制台填入，勿提交
      # ── Anthropic 标准接口（官方 API）──
      - key: ANTHROPIC_BASE_URL
        value: https://api.anthropic.com
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: ANTHROPIC_API_KEY
        sync: false  # 在 Render 控制台填入，勿提交
      # ── CORS：部署后填 Vercel 域名 ──
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./vibechat.db
      - key: MATCH_TIMEOUT_SECONDS
        value: "15"
